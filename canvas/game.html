        Game Description:
        - 16 cards (8 pairs) memory matching game

    <!-- Audio Control Button -->
    <button id="muteToggle" style="position: fixed; top: 10px; right: 10px; z-index: 101; background: rgba(0,0,0,0.5); color: white; border: none; padding: 10px;">🔊</button>

    <!-- Start Game Overlay (hidden initially for multiplayer) -->
    <div class="overlay-text" id="startText">
        <span>Start Game</span>
        <button class="close-btn" onclick="document.getElementById('startText').classList.remove('visible')">×</button>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameOvertext" class="overlay-text">GAME OVER
        <span class="overlay-text-small">Click to Restart</span>
        <button class="close-btn" onclick="location.reload()">×</button>
        <button class="overlay-menu-btn" onclick="window.location.href='index.html'">🏠 Main Menu</button>
    </div>

    <!-- Victory Overlay -->
    <div id="victory-text" class="overlay-text">YOU WON

        <button class="close-btn" onclick="location.reload()">×</button>
        <button class="overlay-menu-btn" onclick="window.location.href='index.html'">🏠 Main Menu</button>
    </div>

    <!--
        Game Info Display:
        - Time: Countdown timer (100 seconds)
        - Flips: Total card flips counter
        - Player Info: Shows current turn in multiplayer mode

    -->

            </div>

            <div class="gameInfo" id="scores"></div> <!-- Scores display -->
            <button id="backToMenuBtn" class="backToMenuBtn">🏠 Main Menu</button>
        </div>
