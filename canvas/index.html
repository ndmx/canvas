<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Correctly - Choose Your Mode</title>
    <link rel="icon" type="image/png" href="Images/Ghost.png">
    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, push, set, get } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "REMOVED",
            authDomain: "arcadeviva.firebaseapp.com",
            databaseURL: "https://arcadeviva-default-rtdb.firebaseio.com",
            projectId: "arcadeviva",
            storageBucket: "arcadeviva.firebasestorage.app",
            messagingSenderId: "602319250789",
            appId: "1:602319250789:web:ea4bb623360fc037c0ed8c",
            measurementId: "G-TPDEGR6EXB"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Make db available globally
        window.db = db;
        window.ref = ref;
        window.push = push;
        window.set = set;
        window.get = get;
    </script>
</head>
<body>
    <h1 class="pageTitle">Guess Correctly</h1>

    <div class="modeSelection">
        <div class="modeContainer">
            <h2>Choose Your Game Mode</h2>

            <button id="singlePlayerBtn" class="modeBtn">🎃 Single Player</button>

            <button id="multiCreateBtn" class="modeBtn">👻 Create Multiplayer Game</button>

            <div class="joinSection">
                <input type="text" id="gameIdInput" placeholder="Enter Game ID to Join" class="gameIdInput">
                <button id="multiJoinBtn" class="modeBtn joinBtn">🎮 Join Multiplayer</button>
                <div id="gameIdDisplay" class="gameIdDisplay" style="display: none;">
                    <p>Your Game ID: <span id="generatedGameId" class="generatedGameId"></span>
                        <button id="copyGameIdBtn" class="copyBtn" title="Copy Game ID">📋</button>
                    </p>
                    <p class="gameIdInstructions">Share this ID with your friend to let them join!</p>
                    <button id="startGameBtn" class="modeBtn startGameBtn">🎮 Start Game (Wait for friend)</button>
            </div>
            </div>
        </div>
    </div>

    <script>
        // Cache-busting version
        const version = Date.now();

        // Mode selection logic
        document.getElementById('singlePlayerBtn').addEventListener('click', () => {
            window.location.href = `game.html?mode=single&v=${version}`;
        });

        document.getElementById('multiCreateBtn').addEventListener('click', async () => {
            try {
                // Generate new game ID immediately
                const gamesRef = ref(db, 'games');
                const newGameRef = push(gamesRef);
                const gameId = newGameRef.key;

                // Initialize basic game state
                await set(newGameRef, {
                    status: 'waiting',
                    created: Date.now(),
                    hostId: Math.random().toString(36).substring(2, 9),
                    players: {},
                    currentTurn: null,
                    matchedCards: [],
                    revealed: {},
                    cardOrder: null
                });

                // Hide the create/join buttons and show the game ID
                document.getElementById('multiCreateBtn').style.display = 'none';
                document.getElementById('gameIdInput').style.display = 'none';
                document.getElementById('multiJoinBtn').style.display = 'none';

                // Show the generated game ID
                const gameIdDisplay = document.getElementById('gameIdDisplay');
                const generatedGameId = document.getElementById('generatedGameId');
                generatedGameId.textContent = gameId;
                gameIdDisplay.style.display = 'block';

                // Add event listener for start game button
                document.getElementById('startGameBtn').addEventListener('click', () => {
                    window.location.href = `game.html?mode=create&id=${gameId}&v=${version}`;
                });

                // Add event listener for copy button
                document.getElementById('copyGameIdBtn').addEventListener('click', async () => {
                    const gameIdText = generatedGameId.textContent;
                    try {
                        await navigator.clipboard.writeText(gameIdText);
                        const copyBtn = document.getElementById('copyGameIdBtn');
                        copyBtn.textContent = '✅';
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.textContent = '📋';
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    } catch (err) {
                        console.error('Failed to copy game ID:', err);
                        // Fallback for older browsers
                        const textArea = document.createElement('textarea');
                        textArea.value = gameIdText;
                        document.body.appendChild(textArea);
                        textArea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textArea);

                        const copyBtn = document.getElementById('copyGameIdBtn');
                        copyBtn.textContent = '✅';
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.textContent = '📋';
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    }
                });

                console.log('Game created with ID:', gameId);
            } catch (error) {
                console.error('Error creating game:', error);
                alert('Failed to create game. Please try again.');
            }
        });

        document.getElementById('multiJoinBtn').addEventListener('click', () => {
            const gameId = document.getElementById('gameIdInput').value.trim();
            if (!gameId) {
                alert('Please enter a Game ID to join');
                return;
            }
            window.location.href = `game.html?mode=join&id=${gameId}&v=${version}`;
        });

    </script>
</body>
</html>
