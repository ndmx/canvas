<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Correctly - Choose Your Mode</title>
    <link rel="icon" type="image/png" href="Images/Ghost.png">
    <link rel="stylesheet" href="style.css">

    </script>
</head>
<body>
    <h1 class="pageTitle">Guess Correctly</h1>

    <div class="modeSelection">
        <div class="modeContainer">
            <h2>Choose Your Game Mode</h2>

            <button id="singlePlayerBtn" class="modeBtn">🎃 Single Player</button>

            <button id="multiCreateBtn" class="modeBtn">👻 Create Multiplayer Game</button>

            <p class="multiplayer-description">
                👥 <strong>Hot-Seat Multiplayer:</strong> Take turns on the same device!<br>
                <small>Perfect for playing with friends or family locally</small>
            </p>
        </div>
    </div>

    <script>
        // Cache-busting version
        const version = Date.now();

        // Mode selection logic
        document.getElementById('singlePlayerBtn').addEventListener('click', () => {
            window.location.href = `game.html?mode=single&v=${version}`;
        });

        document.getElementById('multiCreateBtn').addEventListener('click', () => {
            // Simple multiplayer: Just redirect to game with multiplayer mode
            // Players will take turns manually by sharing the browser/game
            window.location.href = `game.html?mode=multiplayer&v=${version}`;
        });

    </script>
</body>
</html>
